name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r langchain-miroservice/requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: test-key-for-ci
          MODEL_NAME: gpt-3.5-turbo
          SUMMARIZER_MODEL_NAME: gpt-3.5-turbo
          SUMMARY_TOKEN_THRESHOLD: "1000"
        run: pytest langchain-miroservice/tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          docker build \
            -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/backend:latest \
            ./langchain-miroservice
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/backend:latest

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://${{ secrets.DROPLET_HOST }}:8000 \
            -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/frontend:latest \
            ./langchain-frontend
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            echo ${{ secrets.DO_ACCESS_TOKEN }} | docker login registry.digitalocean.com --username token --password-stdin
            cd /app
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            docker image prune -f
